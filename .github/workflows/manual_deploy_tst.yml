name: [TST] Despliegue manual

on:
  workflow_dispatch:   # permite ejecución manual desde la pestaña "Actions"

jobs:
  manual-deploy:
    runs-on: ubuntu-latest
    name: Despliegue manual TST

    steps:
      - name: Checkout tst branch
        uses: actions/checkout@v4
        with:
          ref: tst   # siempre toma el código de la rama tst

      - name: Install PostgreSQL client
        run: sudo apt-get update && sudo apt-get install -y postgresql-client

      - name: Compile and validate SQL files
        env:
          PGHOST: ${{ secrets.DB_HOST_TST }}
          PGUSER: ${{ secrets.DB_USER_TST }}
          PGPASSWORD: ${{ secrets.DB_PASS_TST }}
          PGDATABASE: ${{ secrets.DB_NAME_TST }}
        run: |
          echo "🔄 Comenzando el despliegue manual en DB..."
          BASE_DIR="tstsite_db/tstsite_exe"

          if [ ! -d "$BASE_DIR" ]; then
            echo "❌ El directorio $BASE_DIR no existe."
            exit 1
          fi

          shopt -s nullglob
          FILES=($BASE_DIR/*.sql)

          if [ ${#FILES[@]} -eq 0 ]; then
            echo "⚠️ No hay ficheros .sql en $BASE_DIR"
            exit 1
          fi

          ERROR=0
          for file in "${FILES[@]}"; do
            echo "➡️ Compilando: $file"
            if ! psql -h "$PGHOST" -U "$PGUSER" -d "$PGDATABASE" -v ON_ERROR_STOP=1 -f "$file"; then
              echo "❌ Error compilando $file"
              ERROR=1
              break
            fi
          done

          if [ $ERROR -ne 0 ]; then
            echo "🚨 Despliegue fallido. Revisa el log anterior."
            exit 1
          fi

          echo "✅ Despliegue manual completado correctamente en TST."
