name: Despliegue automatico en TST en PR

on:
  pull_request:
    branches:
      - tst           # Se ejecuta solo cuando el PR apunta a tst
    types: [opened, synchronize, reopened]

jobs:
  test-compile:
    runs-on: ubuntu-latest
    name: Compile Functions & Procedures on AlwaysData (TST)

    steps:
      - name: Checkout source branch (e.g. dev)
        uses: actions/checkout@v4
        with:
          ref: ${{ github.head_ref }}   # la rama origen del PR

      - name: Install PostgreSQL client
        run: sudo apt-get update && sudo apt-get install -y postgresql-client

      - name: Compile SQL functions & procedures
        env:
          PGHOST: ${{ secrets.DB_HOST_TST }}
          PGUSER: ${{ secrets.DB_USER_TST }}
          PGPASSWORD: ${{ secrets.DB_PASS_TST }}
          PGDATABASE: ${{ secrets.DB_NAME_TST }}
        run: |
          echo "🔄 Comenzando la compilacion en TST..."

          BASE_DIR="tstsite_db/tstsite_exe"
          if [ ! -d "$BASE_DIR" ]; then
            echo "❌ Directorio $BASE_DIR no encontrado."
            exit 1
          fi

          shopt -s nullglob
          FILES=($BASE_DIR/*.sql)

          if [ ${#FILES[@]} -eq 0 ]; then
            echo "⚠️ No existen .sql en $BASE_DIR"
            exit 1
          fi

          for file in "${FILES[@]}"; do
            echo "➡️ Compilando: $file"
            psql -h "$PGHOST" -U "$PGUSER" -d "$PGDATABASE" -f "$file"
          done

          echo "✅ Despliegue automatico finalizado correctamente en TST!"
