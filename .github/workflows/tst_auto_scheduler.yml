name: TST - Despliegue automático planificado

on:
  schedule:
    - cron: '0 6 * * *'   # 07:00 hora de España (06:00 UTC)
    - cron: '0 18 * * *'  # 19:00 hora de España (18:00 UTC)
  workflow_dispatch:       # También puedes lanzarlo manualmente si quieres probar

jobs:
  trigger-manual-deploy:
    uses: ./.github/workflows/tst_manual_deploy.yml   # 👈 llama al otro workflow