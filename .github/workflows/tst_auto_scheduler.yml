name: TST - Despliegue automático planificado

on:
  schedule:
    - cron: '0 6 * * *'
    - cron: '0 18 * * *'
  workflow_dispatch:

jobs:
  trigger-deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Trigger TST deploy workflow
        uses: peter-evans/workflow-dispatch@v1
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
          repository: ${{ github.repository }}
          workflow: tst_deploy_func_proc.yml
          ref: main
          inputs: |
            db_host: ${{ secrets.DB_HOST_TST }}
            db_user: ${{ secrets.DB_USER_TST }}
            db_pass: ${{ secrets.DB_PASS_TST }}
            db_name: ${{ secrets.DB_NAME_TST }}
