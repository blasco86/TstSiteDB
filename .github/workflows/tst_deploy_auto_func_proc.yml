name: TST - Despliegue automático de funciones/procedimientos planificado

on:
  schedule:
    - cron: '0 5 * * *'   # 07:00 hora España en invierno / 07:00 en verano
    - cron: '0 17 * * *'  # 19:00 hora España en invierno / 19:00 en verano
  workflow_dispatch:

jobs:
  deploy-tst:
    runs-on: ubuntu-latest
    env:
      PGHOST: ${{ secrets.DB_HOST_TST }}
      PGUSER: ${{ secrets.DB_USER_TST }}
      PGPASSWORD: ${{ secrets.DB_PASS_TST }}
      PGDATABASE: ${{ secrets.DB_NAME_TST }}

    steps:
      - name: 🧩 Descargar código de la rama tst
        uses: actions/checkout@v4
        with:
          ref: tst

      - name: ⚙️ Instalar cliente PostgreSQL
        run: |
          sudo apt-get update -y
          sudo apt-get install -y postgresql-client

      - name: 🚀 Desplegar funciones/procedimientos
        run: |
          echo "🔄 Iniciando despliegue en la base de datos..."
          if [ -z "$PGHOST" ] || [ -z "$PGUSER" ] || [ -z "$PGPASSWORD" ] || [ -z "$PGDATABASE" ]; then
            echo "❌ Faltan variables de conexión."
            exit 1
          fi

          BASE_DIR="tstsite_db/tstsite_exe"
          if [ ! -d "$BASE_DIR" ]; then
            echo "❌ El directorio $BASE_DIR no existe."
            exit 1
          fi

          shopt -s nullglob
          FILES=($BASE_DIR/*.sql)
          if [ ${#FILES[@]} -eq 0 ]; then
            echo "⚠️ No hay ficheros .sql en $BASE_DIR."
            exit 1
          fi

          ERROR=0
          for file in "${FILES[@]}"; do
            echo "➡️ Compilando: $file"
            if ! PGPASSWORD="$PGPASSWORD" psql -h "$PGHOST" -U "$PGUSER" -d "$PGDATABASE" -v ON_ERROR_STOP=1 -f "$file"; then
              echo "❌ Error al compilar $file"
              ERROR=1
              break
            fi
          done

          if [ $ERROR -ne 0 ]; then
            echo "🚨 Despliegue fallido."
            exit 1
          fi

          echo "✅ Despliegue completado correctamente en TST."

      - name: 🔁 Reiniciar conexiones activas
        run: |
          echo "🔁 Cerrando conexiones activas..."
          RESULT=$(psql -h "$PGHOST" -U "$PGUSER" -d "$PGDATABASE" -t -c \
            "SELECT count(*) FROM pg_stat_activity WHERE datname = current_database() AND pid <> pg_backend_pid();")
          echo "🔍 Se van a cerrar $RESULT conexiones activas."
          psql -h "$PGHOST" -U "$PGUSER" -d "$PGDATABASE" -c \
            "SELECT pg_terminate_backend(pid) FROM pg_stat_activity WHERE datname = current_database() AND pid <> pg_backend_pid();"
          echo "✅ Conexiones cerradas correctamente."

      # 🆕 --- NUEVA ETAPA: VACUUM COMPLETO ---
      - name: 🧹 Ejecutar VACUUM FULL (fuera de transacción)
        run: |
          echo "🧹 Iniciando VACUUM FULL en todas las tablas del esquema tstsite..."
          psql -h "$PGHOST" -U "$PGUSER" -d "$PGDATABASE" <<'SQL'
          DO $$
          DECLARE
            r RECORD;
          BEGIN
            FOR r IN
              SELECT table_schema, table_name
              FROM information_schema.tables
              WHERE table_schema = 'tstsite'
                AND table_type = 'BASE TABLE'
            LOOP
              RAISE NOTICE '🧩 Ejecutando VACUUM FULL ANALYZE en %.%', r.table_schema, r.table_name;
              EXECUTE format('VACUUM (FULL, ANALYZE) %I.%I;', r.table_schema, r.table_name);
            END LOOP;
          END$$;
          SQL
          echo "✅ VACUUM FULL completado correctamente."

      # 🆕 --- NUEVA ETAPA: EJECUTAR PROCEDIMIENTO DE OPTIMIZACIÓN ---
      - name: ⚙️ Ejecutar procedimiento de optimización
        run: |
          echo "⚙️ Ejecutando optimización general (ANALYZE, REINDEX, CLUSTER)..."
          psql -h "$PGHOST" -U "$PGUSER" -d "$PGDATABASE" -c \
            "CALL tstsite_exe.pr_optimizador(true, true, true, true);"
          echo "✅ Optimización completada correctamente."
