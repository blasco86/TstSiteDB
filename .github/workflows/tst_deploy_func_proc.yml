name: TST - Despliegue funciones/procedimientos

on:
  workflow_dispatch:
  workflow_call:

jobs:
  manual-deploy:
    runs-on: ubuntu-latest
    name: Despliegue TST

    steps:
      - name: 🧩 Descargar código de la rama tst
        uses: actions/checkout@v4
        with:
          ref: tst

      - name: ⚙️ Instalar cliente PostgreSQL
        run: |
          sudo apt-get update -y
          sudo apt-get install -y postgresql-client

      - name: 🚀 Compilar y validar funciones/procedimientos
        env:
          PGHOST: ${{ secrets.DB_HOST_TST }}
          PGUSER: ${{ secrets.DB_USER_TST }}
          PGPASSWORD: ${{ secrets.DB_PASS_TST }}
          PGDATABASE: ${{ secrets.DB_NAME_TST }}
        run: |
          echo "🔍 Verificando variables de conexión..."
          echo "  🔹 PGHOST: $PGHOST"
          echo "  🔹 PGUSER: $PGUSER"
          echo "  🔹 PGDATABASE: $PGDATABASE"

          if [ -z "$PGHOST" ] || [ -z "$PGUSER" ] || [ -z "$PGPASSWORD" ] || [ -z "$PGDATABASE" ]; then
            echo "❌ Faltan variables de conexión. Revisa los 'secrets' del repositorio."
            exit 1
          fi

          echo "🔄 Probando conexión con la base de datos..."
          if ! psql "host=$PGHOST user=$PGUSER password=$PGPASSWORD dbname=$PGDATABASE" -c "SELECT version();" > /dev/null; then
            echo "❌ No se pudo conectar al servidor PostgreSQL ($PGHOST)"
            exit 1
          fi
          echo "✅ Conexión exitosa con la base de datos."

          BASE_DIR="tstsite_db/tstsite_exe"

          if [ ! -d "$BASE_DIR" ]; then
            echo "❌ El directorio $BASE_DIR no existe."
            exit 1
          fi

          shopt -s nullglob
          FILES=($BASE_DIR/*.sql)

          if [ ${#FILES[@]} -eq 0 ]; then
            echo "⚠️ No hay ficheros .sql en $BASE_DIR."
            exit 1
          fi

          ERROR=0
          for file in "${FILES[@]}"; do
            echo "➡️ Compilando: $file"
            if ! psql "host=$PGHOST user=$PGUSER password=$PGPASSWORD dbname=$PGDATABASE" -v ON_ERROR_STOP=1 -f "$file"; then
              echo "❌ Error al compilar $file"
              ERROR=1
              break
            fi
          done

          if [ $ERROR -ne 0 ]; then
            echo "🚨 Despliegue fallido. Revisa el log anterior."
            exit 1
          fi

          echo "✅ Despliegue completado correctamente en TST."

      - name: 🔁 Reiniciar conexiones activas tras el despliegue
        env:
          PGHOST: ${{ secrets.DB_HOST_TST }}
          PGUSER: ${{ secrets.DB_USER_TST }}
          PGPASSWORD: ${{ secrets.DB_PASS_TST }}
          PGDATABASE: ${{ secrets.DB_NAME_TST }}
        run: |
          echo "🔁 Cerrando conexiones activas en la base de datos..."
          psql "host=$PGHOST user=$PGUSER password=$PGPASSWORD dbname=$PGDATABASE" -c \
            "SELECT pg_terminate_backend(pid)
             FROM pg_stat_activity
             WHERE datname = current_database()
             AND pid <> pg_backend_pid();"
          
          echo "✅ Conexiones cerradas correctamente."
