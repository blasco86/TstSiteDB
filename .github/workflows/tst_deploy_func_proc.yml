name: TST - Despliegue funciones/procedimientos

on:
  workflow_dispatch:   # ejecución manual
  workflow_call:       # permite ser invocado desde otro workflow
    inputs:
      db_host:
        required: true
        type: string
      db_user:
        required: true
        type: string
      db_pass:
        required: true
        type: string
      db_name:
        required: true
        type: string

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: 🧩 Descargar código de la rama tst
        uses: actions/checkout@v4
        with:
          ref: tst

      - name: ⚙️ Instalar cliente PostgreSQL
        run: |
          sudo apt-get update -y
          sudo apt-get install -y postgresql-client

      - name: 🚀 Desplegar funciones/procedimientos
        env:
          PGHOST: ${{ inputs.db_host }}
          PGUSER: ${{ inputs.db_user }}
          PGPASSWORD: ${{ inputs.db_pass }}
          PGDATABASE: ${{ inputs.db_name }}
        run: |
          echo "🔄 Iniciando despliegue en la base de datos..."
          if [ -z "$PGHOST" ] || [ -z "$PGUSER" ] || [ -z "$PGPASSWORD" ] || [ -z "$PGDATABASE" ]; then
            echo "❌ Faltan variables de conexión."
            exit 1
          fi

          BASE_DIR="tstsite_db/tstsite_exe"
          if [ ! -d "$BASE_DIR" ]; then
            echo "❌ El directorio $BASE_DIR no existe."
            exit 1
          fi

          shopt -s nullglob
          FILES=($BASE_DIR/*.sql)
          if [ ${#FILES[@]} -eq 0 ]; then
            echo "⚠️ No hay ficheros .sql en $BASE_DIR."
            exit 1
          fi

          ERROR=0
          for file in "${FILES[@]}"; do
            echo "➡️ Compilando: $file"
            if ! PGPASSWORD="$PGPASSWORD" psql -h "$PGHOST" -U "$PGUSER" -d "$PGDATABASE" -v ON_ERROR_STOP=1 -f "$file"; then
              echo "❌ Error al compilar $file"
              ERROR=1
              break
            fi
          done

          if [ $ERROR -ne 0 ]; then
            echo "🚨 Despliegue fallido."
            exit 1
          fi

          echo "✅ Despliegue completado correctamente en TST."

      - name: 🔁 Reiniciar conexiones activas
        env:
          PGHOST: ${{ inputs.db_host }}
          PGUSER: ${{ inputs.db_user }}
          PGPASSWORD: ${{ inputs.db_pass }}
          PGDATABASE: ${{ inputs.db_name }}
        run: |
          echo "🔁 Cerrando conexiones activas..."
          RESULT=$(psql -h "$PGHOST" -U "$PGUSER" -d "$PGDATABASE" -t -c \
            "SELECT count(*) FROM pg_stat_activity WHERE datname = current_database() AND pid <> pg_backend_pid();")
          echo "🔍 Se van a cerrar $RESULT conexiones activas."
          psql -h "$PGHOST" -U "$PGUSER" -d "$PGDATABASE" -c \
            "SELECT pg_terminate_backend(pid) FROM pg_stat_activity WHERE datname = current_database() AND pid <> pg_backend_pid();"
          echo "✅ Conexiones cerradas correctamente."
