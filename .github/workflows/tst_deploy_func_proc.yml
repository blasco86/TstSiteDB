# 📄 .github/workflows/tst-deploy.yml
# Despliega funciones y procedimientos en la BD TST (Alwaysdata)
# Puede ejecutarse manualmente o ser invocado desde otro workflow.

name: TST - Despliegue funciones/procedimientos

on:
  workflow_dispatch:  # 👉 Permite ejecución manual desde la pestaña "Actions"
  workflow_call:      # 👈 Permite ser invocado desde otro workflow (por horas, por ejemplo)

jobs:
  deploy-tst:
    runs-on: ubuntu-latest
    name: Despliegue TST

    # 🔐 Variables de entorno para conexión a Alwaysdata
    env:
      PGHOST: ${{ secrets.DB_HOST_TST }}
      PGUSER: ${{ secrets.DB_USER_TST }}
      PGPASSWORD: ${{ secrets.DB_PASS_TST }}
      PGDATABASE: ${{ secrets.DB_NAME_TST }}

      Run echo "🔍 Verificando variables de conexión..."
      🔍 Verificando variables de conexión...
      ❌ Faltan variables de conexión. Revisa los 'secrets' del repositorio.
      Error: Process completed with exit code 1.

    steps:
      - name: 🧩 Descargar código de la rama tst
        uses: actions/checkout@v4
        with:
          ref: tst   # Siempre toma el código de la rama de test

      - name: ⚙️ Instalar cliente PostgreSQL
        run: |
          sudo apt-get update -y
          sudo apt-get install -y postgresql-client

      - name: 🔍 Verificar variables de conexión
        run: |
          echo "🔍 Verificando variables de conexión..."
          if [ -z "$PGHOST" ] || [ -z "$PGUSER" ] || [ -z "$PGPASSWORD" ] || [ -z "$PGDATABASE" ]; then
            echo "❌ Faltan variables de conexión. Revisa los 'secrets' del repositorio."
            exit 1
          fi
          echo "  🔹 PGHOST: $PGHOST"
          echo "  🔹 PGUSER: $PGUSER"
          echo "  🔹 PGDATABASE: $PGDATABASE"
          echo "✅ Variables de conexión cargadas correctamente."

      - name: 🚀 Compilar y validar funciones/procedimientos
        run: |
          echo "🔄 Iniciando despliegue en la base de datos..."
          BASE_DIR="tstsite_db/tstsite_exe"

          if [ ! -d "$BASE_DIR" ]; then
            echo "❌ El directorio $BASE_DIR no existe."
            exit 1
          fi

          shopt -s nullglob
          FILES=($BASE_DIR/*.sql)

          if [ ${#FILES[@]} -eq 0 ]; then
            echo "⚠️ No hay ficheros .sql en $BASE_DIR."
            exit 1
          fi

          ERROR=0
          for file in "${FILES[@]}"; do
            echo "➡️ Compilando: $file"
            if ! psql -h "$PGHOST" -U "$PGUSER" -d "$PGDATABASE" -v ON_ERROR_STOP=1 -f "$file"; then
              echo "❌ Error al compilar $file"
              ERROR=1
              break
            fi
          done

          if [ $ERROR -ne 0 ]; then
            echo "🚨 Despliegue fallido. Revisa el log anterior."
            exit 1
          fi

          echo "✅ Despliegue completado correctamente en TST."

      - name: 🔁 Reiniciar conexiones activas tras el despliegue
        run: |
          echo "🔁 Cerrando conexiones activas en la base de datos..."
          RESULT=$(psql -h "$PGHOST" -U "$PGUSER" -d "$PGDATABASE" -t -c \
            "SELECT count(*) FROM pg_stat_activity WHERE datname = current_database() AND pid <> pg_backend_pid();")
          
          echo "🔍 Se van a cerrar $RESULT conexiones activas (excepto la actual)."
          
          psql -h "$PGHOST" -U "$PGUSER" -d "$PGDATABASE" -c \
            "SELECT pg_terminate_backend(pid) FROM pg_stat_activity WHERE datname = current_database() AND pid <> pg_backend_pid();"
          
          echo "✅ Conexiones cerradas correctamente."
